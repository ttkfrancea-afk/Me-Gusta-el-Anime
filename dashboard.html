<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Me Gusta el Anime · Dashboard</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/transitions.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- El velo llega YA cerrado: así no hay flash de contenido antes de la animación -->
  <div id="portal-veil" class="portal-veil veil--cubierto"></div>

  <div class="app-shell">
    <header class="navbar">
      <div class="navbar__logo">ME GUSTA<br>EL ANIME</div>
      <div class="navbar__usuario">
        <div class="navbar__puntos">
          <span id="navbar-puntos">0</span>
          <span class="etiqueta">pts <i class="fa-solid fa-fire" style="color: var(--color-accent-red);"></i></span>
        </div>
        <span id="navbar-username" class="navbar__username">Invitado</span>
      </div>
    </header>

    <main class="main-content" id="main-scroll-container">

      <!-- INICIO -->
      <div id="tab-home" class="tab-pane activa">
        <section>
          <h2 class="seccion-titulo">Premios del Torneo</h2>
          <div id="premios-grid" class="premios-grid"></div>
        </section>
        <section>
          <h2 class="seccion-titulo">Feed de la Comunidad</h2>
          <div id="feed-filtros" class="feed-filtros"></div>
          <div id="feed-grid" class="feed-grid"></div>
        </section>
      </div>

      <!-- BUSCAR -->
      <div id="tab-search" class="tab-pane">
        <section>
          <h2 class="seccion-titulo">Explorar</h2>
          <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" class="search-input" placeholder="Buscar animes, usuarios, videos...">
          </div>
          <div class="estado-vacio">
            <i class="fa-solid fa-ghost"></i>
            <p>Comienza a escribir para ver resultados</p>
          </div>
        </section>
      </div>

      <!-- ARCADE -->
      <div id="tab-arcade" class="tab-pane">
        <section>
          <h2 class="seccion-titulo">Zona Arcade</h2>
          <div id="games-grid"></div>
        </section>
      </div>

      <!-- QUIZ -->
      <div id="tab-quiz" class="tab-pane">
        <section>
          <h2 class="seccion-titulo">Zona Quiz</h2>
          <div id="quiz-grid"></div>
        </section>
      </div>

      <!-- AJUSTES -->
      <div id="tab-ajustes" class="tab-pane">
        <div class="perfil-card">
          <div class="perfil-avatar" id="perfil-avatar">?</div>
          <div>
            <div class="perfil-info__nombre" id="perfil-nombre">Invitado</div>
            <div class="perfil-info__puntos" id="perfil-puntos">0 pts</div>
          </div>
        </div>
        <div class="settings-list">
          <button class="settings-btn" onclick="window.location.href='perfil.html'"><i class="fa-solid fa-user"></i> <span>Mi Perfil</span></button>
          <button class="settings-btn" onclick="window.location.href='legal.html'"><i class="fa-solid fa-scale-balanced"></i> <span>Información Legal</span></button>
          <button class="settings-btn settings-btn--peligro" id="btn-logout-app"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
        </div>
      </div>

    </main>

    <nav class="bottom-nav">
      <div class="nav-item activo" data-tab="home" aria-label="Inicio"><i class="fa-solid fa-house"></i></div>
      <div class="nav-item" data-tab="search" aria-label="Buscar"><i class="fa-solid fa-magnifying-glass"></i></div>
      <div class="nav-item" data-tab="arcade" aria-label="Arcade"><i class="fa-solid fa-khanda"></i></div>
      <div class="nav-item" data-tab="quiz" aria-label="Quiz"><i class="fa-solid fa-brain"></i></div>
      <div class="nav-item" data-tab="ajustes" aria-label="Ajustes"><i class="fa-solid fa-gear"></i></div>
    </nav>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
