<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling - Impacto y Desintegración</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background: transparent;
        }
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .escenario-container {
            width: 100%;
            max-width: 360px;
            height: 640px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hunter-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        /* =========================================================
           1. SUNG JIN-WOO (RANGO E) - APLASTADO Y DESPARRAMADO
           ========================================================= */
        .sung-e {
            z-index: 1;
            opacity: 0;
            transform-origin: bottom center;
            animation: secuenciaSungE 8s ease-out infinite;
        }

        /* =========================================================
           2. MONARCA (RANGO S) - FISICA DE IMPACTO PIXAR
           ========================================================= */
        .sung-s {
            z-index: 2;
            opacity: 1;
            transform-origin: bottom center;
            transform: translate3d(0, -100vh, 0);
            animation: secuenciaPixarMonarca 8s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        /* =========================================================
           3. HUMO DE LAS SOMBRAS
           ========================================================= */
        .contenedor-sombras {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .calavera-humo {
            position: absolute;
            background: rgba(139, 92, 246, 0.35);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 0 22px #a855f7, inset 0 0 12px #5b21b6;
            opacity: 0;
            will-change: transform, opacity;
        }

        .sk1 { width: 75px; height: 85px; bottom: 18%; left: 8%; --dx: -90px; --dy: -190px; animation: disparoHumo 1.5s ease-out 4.64s infinite; }
        .sk2 { width: 95px; height: 105px; bottom: 12%; right: 4%; --dx: 100px; --dy: -230px; animation: disparoHumo 1.5s ease-out 4.68s infinite; }

        /* =========================================================
           CRONOLOGÍA MEJORADA: EFECTO EXPULSIÓN
           ========================================================= */

        @keyframes secuenciaSungE {
            /* Entrada limpia desde el fondo */
            0% { transform: translate3d(0, 0, -300px) scale3d(0, 0, 0); opacity: 0; }
            15% { transform: translate3d(0, 0, 0) scale3d(1, 1, 1); opacity: 1; }
            
            /* Temblor previo */
            18%, 26%, 34% { transform: translate3d(-3px, 0, 0); opacity: 1; }
            22%, 30%, 38% { transform: translate3d(3px, 0, 0); opacity: 1; }
            42% { transform: translate3d(0, 0, 0); opacity: 1; }

            /* --- REBOTES Y EXPULSIÓN DE CAPA --- */
            45% { transform: scale3d(1.1, 0.60, 1); opacity: 1; } /* Primer golpe: chato */
            49% { transform: scale3d(1.03, 0.70, 1); opacity: 1; } /* Alivio del primer rebote */
            52% { transform: scale3d(1.2, 0.30, 1); opacity: 0.8; } /* Segundo golpe: casi seco */
            55% { transform: scale3d(1.1, 0.35, 1); opacity: 0.7; } /* Alivio corto */
            
            /* 58% al 60%: ¡EL TRUCO! El impacto final la aplasta a cero verticalmente 
               y la expande horizontalmente (scale X en 1.6) vaciando la opacidad a 0 */
            58% { transform: scale3d(1.6, 0.01, 1); opacity: 0.3; } 
            60%, 90% { transform: scale3d(2, 0, 1); opacity: 0; } /* Desaparecida por completo, no queda rastro abajo */
            
            96%, 100% { transform: scale3d(0, 0, 0); opacity: 0; }
        }

        @keyframes secuenciaPixarMonarca {
            0%, 40% { transform: translate3d(0, -100vh, 0); }
            
            /* PISOTÓN 1 */
            45% { transform: translate3d(0, 0, 0) scale3d(1.08, 0.8, 1); }
            
            /* BRINCO 1 */
            49% { transform: translate3d(0, -60px, 0) scale3d(0.95, 1.1, 1); }
            
            /* PISOTÓN 2 */
            52% { transform: translate3d(0, 0, 0) scale3d(1.12, 0.85, 1); }
            
            /* BRINCO 2 */
            55% { transform: translate3d(0, -20px, 0) scale3d(0.98, 1.03, 1); }
            
            /* PISOTÓN 3 (FINAL DEFINITIVO) */
            58% { transform: translate3d(0, 0, 0) scale3d(1.05, 0.95, 1); }
            
            /* Estabilización limpia del Monarca solo */
            62%, 90% { transform: translate3d(0, 0, 0) scale3d(1, 1, 1); }
            
            96%, 100% { transform: translate3d(0, -100vh, 0); }
        }

        /* Humo */
        @keyframes disparoHumo {
            0% { transform: translate3d(0, 0, 0) scale(0.2); opacity: 0; }
            15% { opacity: 0.9; filter: blur(1px); }
            100% { transform: translate3d(var(--dx), var(--dy), 0) scale(1.7); opacity: 0; filter: blur(15px); }
        }
    </style>
</head>
<body>

    <div class="escenario-container">
        
        <!-- Rango E: Se aplasta y en el último golpe se estira horizontalmente desvaneciéndose -->
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/SungE.webp" alt="Sung Jin-woo Rango E" class="hunter-img sung-e">
        
        <!-- Monarca: Clava los pisotones limpiando el espacio -->
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/Monarca.webp" alt="El Monarca de las Sombras" class="hunter-img sung-s">

        <!-- Humo morado -->
        <div class="contenedor-sombras">
            <div class="calavera-humo sk1"></div>
            <div class="calavera-humo sk2"></div>
        </div>

    </div>

</body>
</html>
