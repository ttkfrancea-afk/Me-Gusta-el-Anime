<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Me Gusta el Anime - Ultimate Jutsu</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        html, body { background: transparent; }
        body { height: 100vh; width: 100vw; position: relative; overflow: hidden; }

        /* El contenedor permanece oculto hasta que TODO esté cargado en memoria */
        .cinematic-wrapper { display: none; width: 100%; height: 100%; position: relative; }
        .ready .cinematic-wrapper { display: block; }

        /* Optimización extrema de renderizado de imagen para evitar tirones */
        .ninja-step, .clone-step { 
            position: absolute; 
            opacity: 0; 
            will-change: opacity, transform, filter; 
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: auto;
            transform: translateZ(0); /* Forzar aceleración por GPU */
        }

        /* =========================================================
           ANIMACIONES BASE
           ========================================================= */
        @keyframes zigzagLibre {
            0% { opacity: 0; transform: scale3d(0.4, 0.4, 1); filter: blur(8px); }
            10% { opacity: 1; transform: scale3d(1, 1, 1); filter: blur(0px); }
            90% { opacity: 1; transform: scale3d(1, 1, 1); filter: blur(0px); }
            100% { opacity: 0; transform: scale3d(1.2, 1.2, 1); filter: blur(6px); }
        }

        @keyframes naruto4Intro {
            0% { opacity: 0; filter: blur(10px) brightness(1.5); }
            100% { opacity: 1; filter: blur(0px) brightness(1); }
        }

        @keyframes auraKyubiDirecta {
            0% { filter: drop-shadow(0 0 6px #ff1a00) drop-shadow(0 0 15px #ff6a00); }
            50% { filter: drop-shadow(0 0 14px #e60000) drop-shadow(0 0 28px #ff8800); }
            100% { filter: drop-shadow(0 0 6px #ff1a00) drop-shadow(0 0 15px #ff6a00); }
        }

        /* =========================================================
           BURBUJAS DE CHAKRA (ACTIVADAS CON EL JUTSU A LOS 4.7s)
           ========================================================= */
        .kurama-container {
            position: absolute;
            width: 60vw; height: 50vh;
            bottom: 0; left: 20vw;
            z-index: 22;
            pointer-events: none;
            overflow: visible;
            opacity: 0;
        }
        /* Las burbujas nacen exactamente cuando grita el Jutsu */
        .ready .kurama-container { 
            opacity: 1; 
            transition: opacity 0.3s ease 4.7s; 
        }

        .chakra-bubble {
            position: absolute;
            bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,106,0,0.9) 0%, rgba(230,0,0,0.7) 60%, rgba(150,0,0,0) 100%);
            will-change: transform, opacity;
            animation: subirBurbuja 1.8s infinite linear;
            opacity: 0;
        }

        /* Retardamos el inicio individual para que fluyan infinitamente después del Jutsu */
        .ready .cb1 { width: 45px; height: 45px; left: 15%; --x-move: -20px; animation-delay: 4.7s; }
        .ready .cb2 { width: 60px; height: 60px; left: 45%; --x-move: 30px; animation-delay: 5.0s; }
        .ready .cb3 { width: 35px; height: 35px; left: 70%; --x-move: -15px; animation-delay: 4.8s; }
        .ready .cb4 { width: 50px; height: 50px; left: 30%; --x-move: 10px; animation-delay: 5.2s; }
        .ready .cb5 { width: 40px; height: 40px; left: 60%; --x-move: -35px; animation-delay: 5.4s; }

        @keyframes subirBurbuja {
            0% { transform: translate3d(0, 0, 0) scale(0.4); opacity: 0; }
            15% { opacity: 0.85; }
            50% { background: radial-gradient(circle, rgba(255,165,0,0.8) 0%, rgba(200,0,0,0.5) 70%, rgba(0,0,0,0) 100%); }
            90% { opacity: 0.4; }
            100% { transform: translate3d(var(--x-move), -45vh, 0) scale(1.3); opacity: 0; filter: blur(1px); }
        }

        /* =========================================================
           EFECTOS DE HUMO Y CLONES
           ========================================================= */
        .smoke-bomb {
            position: absolute;
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(240,240,240,1) 0%, rgba(210,210,210,0.8) 40%, rgba(150,150,150,0) 70%);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity, filter;
            z-index: 15;
        }

        @keyframes puffHumoReal {
            0% { transform: scale3d(0.1, 0.1, 1); opacity: 0; filter: blur(2px); }
            10% { opacity: 1; filter: blur(0px); }
            50% { opacity: 0.8; transform: scale3d(1.4, 1.4, 1); filter: blur(5px); }
            100% { transform: scale3d(2.2, 2.2, 1); opacity: 0; filter: blur(15px); }
        }

        @keyframes revelacionClon {
            0% { opacity: 0; transform: scale3d(0.6, 0.6, 1); filter: blur(8px); }
            20% { opacity: 1; filter: blur(0px); }
            100% { opacity: 1; transform: scale3d(1, 1, 1); }
        }

        /* =========================================================
           ANIMISTA EFFECT WITH TEXT SHADOW
           ========================================================= */
        .text-shadow-drop-br {
            -webkit-animation: text-shadow-drop-br 0.6s 4.7s both;
                    animation: text-shadow-drop-br 0.6s 4.7s both;
        }
        @-webkit-keyframes text-shadow-drop-br {
          0% { text-shadow: 0 0 0 rgba(0, 0, 0, 0); }
          100% { text-shadow: 6px 6px 15px rgba(230, 0, 0, 0.85); }
        }
        @keyframes text-shadow-drop-br {
          0% { text-shadow: 0 0 0 rgba(0, 0, 0, 0); }
          100% { text-shadow: 6px 6px 15px rgba(230, 0, 0, 0.85); }
        }

        @keyframes aparecerBurbuja {
            0% { opacity: 0; transform: translate3d(-50%, 15px, 0) scale(0.8); }
            100% { opacity: 1; transform: translate3d(-50%, 0, 0) scale(1); }
        }

        /* =========================================================
           POSICIONES DE PERSONAJES
           ========================================================= */
        .ready .n1 { width: 25vw; top: 5%; left: 5%; animation: zigzagLibre 1s ease-out forwards; }
        .ready .n2 { width: 40vw; top: 20%; right: 5%; animation: zigzagLibre 1s ease-out 1s forwards; }
        .ready .n3 { width: 55vw; bottom: 15%; left: 5%; animation: zigzagLibre 1.2s ease-out 2s forwards; }
        
        .ready .n4 { 
            height: 55vh; width: 100vw; bottom: 0; left: 50%;
            transform: translate3d(-50%, 0, 0); 
            animation: naruto4Intro 0.4s ease-out 3.2s forwards, auraKyubiDirecta 1.4s ease-in-out 3.6s infinite; 
            z-index: 25; 
        }

        .jutsu-bubble {
            position: absolute; top: 36vh; left: 50%; transform: translate3d(-50%, 0, 0);
            background: rgba(255, 255, 255, 0.95); border: 4px solid #000; padding: 10px 20px;
            border-radius: 20px; z-index: 30; opacity: 0; white-space: nowrap; box-shadow: 0 5px 0 #000;
        }
        .ready .jutsu-bubble { animation: aparecerBurbuja 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 4.7s forwards; }
        .jutsu-bubble::after { content: ''; position: absolute; bottom: -13px; left: 50%; transform: translateX(-50%); border-width: 13px 10px 0; border-style: solid; border-color: rgba(255, 255, 255, 0.95) transparent; }
        .jutsu-bubble::before { content: ''; position: absolute; bottom: -19px; left: 50%; transform: translateX(-50%); border-width: 15px 12px 0; border-style: solid; border-color: #000 transparent; z-index: -1; }

        .jutsu-text { color: #ff3c00; font-size: 5vw; -webkit-text-stroke: 1.5px #000; }

        /* ORDEN DE CLONES POST-JUTSU */
        .clone-step { z-index: 10; }
        .sb1 { top: 12%; left: 12%; animation: puffHumoReal 0.5s ease-out 4.9s forwards; }
        .c1 { width: 32vw; top: 10%; left: 5%; animation: revelacionClon 0.4s ease-out 5.0s forwards; }

        .sb2 { top: 42%; right: 10%; animation: puffHumoReal 0.5s ease-out 5.3s forwards; }
        .c2 { width: 35vw; top: 40%; right: 4%; animation: revelacionClon 0.4s ease-out 5.4s forwards; }

        .sb3 { top: 6%; left: 42%; animation: puffHumoReal 0.5s ease-out 5.7s forwards; }
        .c3 { width: 30vw; top: 4%; left: 40%; animation: revelacionClon 0.4s ease-out 5.8s forwards; }

        .sb4 { bottom: 20%; left: 10%; animation: puffHumoReal 0.5s ease-out 6.1s forwards; }
        .c4 { width: 36vw; bottom: 12%; left: 2%; animation: revelacionClon 0.4s ease-out 6.2s forwards; }

        .sb6 { top: 10%; right: 14%; animation: puffHumoReal 0.5s ease-out 6.5s forwards; }
        .c6 { width: 32vw; top: 8%; right: 8%; animation: revelacionClon 0.4s ease-out 6.6s forwards; }

    </style>
</head>
<body>

    <div class="cinematic-wrapper" id="escenaNinja">
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/Naruto1.webp" class="ninja-step n1">
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/Naruto2.webp" class="ninja-step n2">
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/Naruto3.webp" class="ninja-step n3">

        <!-- CONTENEDOR DE BURBUJAS SYNC CON EL JUTSU -->
        <div class="kurama-container">

        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%201.webp" class="clone-step c1">

        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%204.webp" class="clone-step c4">
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%206.webp" class="clone-step c6">

    <script>
        // ENGINE DE PRECARGA POR HARDWARE
        const imagenesJutsu = [

            "https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/Naruto2.webp",

            "https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%202.webp",
            "https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%203.webp",
            "https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/clon%204.webp",

        let imagenesCargadas = 0;

        imagenesJutsu.forEach((src) => {

                    setTimeout(() => {

                    }, 100);
                }
            };
        });
    </script>
