<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación Barco Luffy Aislada</title>
    <style>
        /* Fondo oscuro básico para poder visualizar la animación */
        html, body {
            background: transparent;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor original de la animación */
        .animacion-box {
            height: 140px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            position: relative;
        }

        /* Clase original del barco con su animación original de 10s */
        .barco-luffy {
            width: 175px;  
            animation: navegarIzquierda 10s ease-in-out infinite;
        }

        /* Fotogramas originales extraídos exactamente del login */
        @keyframes navegarIzquierda {
            0% {
                transform: translateX(120px) scale(1.4);
                opacity: 0; 
            }
            15% { opacity: 1; }
            50% {
                transform: translateX(0px) scale(1);
                opacity: 1;
            }
            85% { opacity: 1; }
            100% {
                transform: translateX(-120px) scale(0.2);
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <!-- Animación del Barco extraída -->
    <div class="animacion-box">
        <img src="https://zccbphmebkpuzwbkgtse.supabase.co/storage/v1/object/public/mis-imagenes/imagenes%20de%20login/barco%20luffy.webp" alt="Barco de Luffy" class="barco-luffy">
    </div>

</body>
</html>
