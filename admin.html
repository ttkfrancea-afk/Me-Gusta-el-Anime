<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Oculto | Admin</title>
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
    <div class="glass-panel admin-container">
        <div class="admin-section">
            <h2>Inyectar Video de YouTube</h2>
            <form id="form-video">
                <div class="form-group">
                    <label>URL del Video (Ej: https://www.youtube.com/watch?v=...)</label>
                    <input type="url" name="url" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select name="category">
                        <option value="shonen">Shonen</option>
                        <option value="seinen">Seinen</option>
                    </select>
                </div>
                <button type="submit">Inyectar en Dashboard</button>
            </form>
        </div>

        <div class="admin-section">
            <h2>Configurar Fondo del Login</h2>
            <form id="form-bg">
                <div class="form-group">
                    <label>URL Directa de Imagen</label>
                    <input type="url" name="bg_url" required>
                </div>
                <button type="submit">Actualizar Fondo</button>
            </form>
        </div>
    </div>

    <script type="module" src="./js/admin.js"></script>
</body>
</html>
