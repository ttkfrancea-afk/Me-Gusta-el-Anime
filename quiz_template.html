<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Me gusta el anime</title>
    </head>
<body id="quiz-body">

    <div id="akatsuki-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background-color: black; display: none;">
        </div>

    <main id="quiz-container" style="display: none; text-align: center; padding: 20px;">
        
        <div id="question-zone">
            <h2 id="question-text">Cargando pregunta...</h2>
            <div id="timer-bar"></div> </div>

        <div id="options-zone" style="display: none;">
            <button class="quiz-btn" id="btn-a">Opción A</button>
            <button class="quiz-btn" id="btn-b">Opción B</button>
            <button class="quiz-btn" id="btn-c">Opción C</button>
            <button class="quiz-btn" id="btn-d">Opción D</button>
        </div>

    </main>

    <div id="score-container" style="display: none;">
        <h2>Tu Puntuación: <span id="final-score">0.00</span> / 10</h2>
        <button id="btn-return-dashboard">Volver al Inicio</button>
    </div>

    </body>
</html>
