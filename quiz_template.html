<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quiz Premium · Me Gusta el Anime</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --color-primary: #ff3131;    
      --color-secondary: #a52a2a;  
      --color-accent: #ffc0cb;     
      --color-bg: #030303;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.12);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--color-bg); color: #f5f5f5; font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; align-items: center; }
    .quiz-shell { width: 100%; max-width: 600px; height: 100vh; background: #0c0c0f; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.8); padding: 20px; }

    #akatsuki-overlay { position: absolute; inset: 0; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
    .loading-text { font-family: var(--font-display); font-size: 2rem; color: var(--color-primary); letter-spacing: 2px; text-shadow: 0 0 10px var(--color-primary); animation: pulse 1.5s infinite; }

    .quiz-box { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .question-card { background: var(--glass-bg); border: 2px solid var(--glass-border); border-radius: 24px; padding: 30px 20px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.175); }
    .question-card h2 { font-family: var(--font-body); font-weight: 700; font-size: 1.5rem; line-height: 1.3; }

    .timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
    .timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #f5d142 0%, #ff5722 100%); border-radius: 10px; transform-origin: left; }

    .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .option-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 20px; color: #fff; font-family: var(--font-body); font-size: 1.1rem; font-weight: 600; text-align: left; display: flex; align-items: center; gap: 15px; cursor: pointer; width: 100%; transition: all 0.2s ease; }
    .option-btn .badge { font-family: var(--font-mono); background: rgba(255,255,255,0.1); width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--color-accent); border: 1px solid rgba(255,255,255,0.2); }
    .option-btn:active { transform: scale(0.98); }

    .feedback-card { background: rgba(5, 5, 5, 0.95); border: 2px solid var(--color-primary); box-shadow: 0 0 20px var(--color-primary); border-radius: 24px; padding: 25px; position: relative; display: flex; flex-direction: column; gap: 15px; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
    .feedback-header { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
    .feedback-header.exito { color: #4caf50; text-shadow: 0 0 10px rgba(76,175,80,0.3); }
    .feedback-header.error { color: #f44336; text-shadow: 0 0 10px rgba(244,67,54,0.3); }

    .feedback-body { display: flex; gap: 15px; align-items: center; min-height: 140px; }
    .feedback-info { flex: 1; }
    .feedback-info .correct-answer-title { font-size: 0.85rem; text-transform: uppercase; color: var(--color-accent); font-weight: 700; margin-bottom: 2px; }
    .feedback-info .correct-text { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .feedback-info .extra-explanation { font-size: 0.95rem; color: #a3a3ad; line-height: 1.4; }
    
    .sticker-container { width: 110px; height: 140px; position: relative; flex-shrink: 0; }
    
    /* INYECCIÓN: Clases CSS para el efecto Jujutsu Kaisen */
    .character-sticker { 
      width: 100%; 
      height: 100%; 
      object-fit: contain; 
      filter: drop-shadow(0 0 12px var(--color-primary)) drop-shadow(0 0 25px rgba(0,0,0,0.8)); 
      animation: stickerPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, stickerFloat 3s ease-in-out infinite 0.5s; 
      transform-origin: bottom center;
      opacity: 0;
    }

    .action-btn { width: 100%; background: var(--color-secondary); border: 1px solid var(--color-accent); color: #fff; font-family: var(--font-display); font-size: 1.5rem; padding: 14px; border-radius: 12px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

    .score-card { text-align: center; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 20px; animation: fadeIn 0.5s ease; }
    .score-number { font-family: var(--font-mono); font-size: 3.5rem; color: #f5d142; margin: 15px 0; text-shadow: 0 0 15px rgba(245,209,66,0.4); }

    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* INYECCIÓN: Animaciones Keyframes para el Sticker */
    @keyframes stickerPop { 
      0% { transform: scale(0) rotate(-12deg); opacity: 0; } 
      70% { transform: scale(1.1) rotate(3deg); } 
      100% { transform: scale(1) rotate(0deg); opacity: 1; } 
    }
    @keyframes stickerFloat { 
      0%, 100% { transform: translateY(0); } 
      50% { transform: translateY(-8px); } 
    }
  </style>
</head>
<body>

  <div class="quiz-shell">
    <div id="akatsuki-overlay">
      <div class="loading-text"><i class="fa-solid fa-cloud" style="margin-right: 10px;"></i>Invocando Quiz...</div>
    </div>
    <div class="quiz-box" id="quiz-box"></div>
  </div>

  <script>
    // Conexión corregida utilizando tus credenciales reales
    const SUPABASE_URL = 'https://zccbphmebkpuzwbkgtse.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjY2JwaG1lYmtwdXp3YmtndHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Nzk4OTEsImV4cCI6MjA5NzA1NTg5MX0.Pc3VBCZJDsVrn6cx5eelDF6vwrgs3X7uTI5Q1kNgvDY';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let preguntas = [];
    let indicePreguntaActual = 0;
    let aciertos = 0;
    let timerInterval = null;

    const urlParams = new URLSearchParams(window.location.search);
    const animeSeleccionado = urlParams.get('anime') || 'onepiece';

    window.addEventListener('DOMContentLoaded', cargarPreguntasDelAnime);

    async function cargarPreguntasDelAnime() {
      try {
        const { data, error } = await db
          .from('preguntas_quiz')
          .select('*')
          .eq('anime_id', animeSeleccionado);

        if (error) throw error;

        if (!data || data.length === 0) {
          document.getElementById('quiz-box').innerHTML = `<p style="text-align:center; padding:20px;">No hay preguntas disponibles para este anime aún.</p>`;
          ocultarAkatsuki();
          return;
        }

        preguntas = data;
        const tema = preguntas[0];
        document.documentElement.style.setProperty('--color-primary', tema.color_primario);
        document.documentElement.style.setProperty('--color-secondary', tema.color_secundario);
        document.documentElement.style.setProperty('--color-accent', tema.color_acento);

        setTimeout(() => {
          ocultarAkatsuki();
          mostrarFasePregunta();
        }, 1200);

      } catch (err) {
        console.error("Error cargando el Quiz:", err);
        document.getElementById('quiz-box').innerHTML = `<p style="text-align:center; color:#f44336;">Error de conexión con la base de datos.</p>`;
        ocultarAkatsuki();
      }
    }

    function ocultarAkatsuki() {
      const overlay = document.getElementById('akatsuki-overlay');
      if(overlay) {
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
      }
    }

    function mostrarFasePregunta() {
      const p = preguntas[indicePreguntaActual];
      const contenedor = document.getElementById('quiz-box');
      
      contenedor.innerHTML = `
        <div class="question-card">
          <h2>${p.pregunta}</h2>
          <div class="timer-container"><div class="timer-bar" id="t-bar"></div></div>
        </div>
      `;

      let tiempoRestante = 100; 
      const paso = 100 / 60; 
      const bar = document.getElementById('t-bar');

      timerInterval = setInterval(() => {
        tiempoRestante -= paso;
        if (tiempoRestante <= 0) {
          clearInterval(timerInterval);
          bar.style.transform = `scaleX(0)`;
          mostrarFaseOpciones();
        } else {
          bar.style.transform = `scaleX(${tiempoRestante / 100})`;
        }
      }, 100);
    }

    function mostrarFaseOpciones() {
      const p = preguntas[indicePreguntaActual];
      const contenedor = document.getElementById('quiz-box');

      contenedor.innerHTML = `
        <div class="options-grid">
          <button class="option-btn" onclick="evaluarRespuesta('a')"><div class="badge">A</div> ${p.opcion_a}</button>
          <button class="option-btn" onclick="evaluarRespuesta('b')"><div class="badge">B</div> ${p.opcion_b}</button>
          <button class="option-btn" onclick="evaluarRespuesta('c')"><div class="badge">C</div> ${p.opcion_c}</button>
          <button class="option-btn" onclick="evaluarRespuesta('d')"><div class="badge">D</div> ${p.opcion_d}</button>
        </div>
      `;
    }

    function evaluarRespuesta(opcionSeleccionada) {
      const p = preguntas[indicePreguntaActual];
      const contenedor = document.getElementById('quiz-box');
      
      const esCorrecta = (opcionSeleccionada === p.correcta);
      if (esCorrecta) aciertos++;

      let textoCorrecto = "";
      if(p.correcta === 'a') textoCorrecto = p.opcion_a;
      if(p.correcta === 'b') textoCorrecto = p.opcion_b;
      if(p.correcta === 'c') textoCorrecto = p.opcion_c;
      if(p.correcta === 'd') textoCorrecto = p.opcion_d;

      contenedor.innerHTML = `
        <div class="feedback-card">
          <div class="feedback-header ${esCorrecta ? 'exito' : 'error'}">
            ${esCorrecta ? '<i class="fa-solid fa-circle-check"></i> ¡Éxito!' : '<i class="fa-solid fa-circle-xmark"></i> Incorrecto'}
          </div>
          
          <div class="feedback-body">
            <div class="feedback-info">
              <div class="correct-answer-title">Respuesta Correcta:</div>
              <div class="correct-text">${textoCorrecto}</div>
              <div class="extra-explanation">${p.informacion_extra || 'Sin descripción adicional disponible.'}</div>
            </div>
            <div class="sticker-container">
              <img src="${p.url_sticker || p.personaje_sticker || 'https://via.placeholder.com/110x140?text=Anime'}" class="character-sticker" alt="Personaje">
            </div>
          </div>

          <button class="action-btn" onclick="avanzarPregunta()">Siguiente <i class="fa-solid fa-arrow-right"></i></button>
        </div>
      `;
    }

    function avanzarPregunta() {
      indicePreguntaActual++;
      if (indicePreguntaActual < preguntas.length) {
        mostrarFasePregunta();
      } else {
        mostrarPantallaFinal();
      }
    }

    function mostrarPantallaFinal() {
      const contenedor = document.getElementById('quiz-box');
      const puntuacionFinal = ((aciertos / preguntas.length) * 10).toFixed(2);

      contenedor.innerHTML = `
        <div class="score-card">
          <h2>¡Quiz Completado!</h2>
          <p style="margin-top:10px; color:var(--color-text-muted);">Tu nivel de efectividad se ha calculado con éxito.</p>
          <div class="score-number">${puntuacionFinal} / 10.00</div>
          <p style="color:#4caf50; font-weight:600; margin-bottom:25px;">Aciertos totales: ${aciertos} de ${preguntas.length}</p>
          <button class="action-btn" onclick="window.location.href='dashboard.html'">Volver al Dashboard</button>
        </div>
      `;
    }
  </script>
</body>
</html>
