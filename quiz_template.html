<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quiz Premium · Me Gusta el Anime</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Permanent+Marker&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* VARIABLES DINÁMICAS (Se cambiarán solas según el anime) */
    :root {
      --color-primary: #ff3131;    /* Color base de ventanas/acentos */
      --color-secondary: #a52a2a;  /* Color base de botones */
      --color-accent: #ffc0cb;     /* Detalles/Bordes glow */
      --color-bg: #030303;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.12);
      
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--color-bg);
      color: #f5f5f5;
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Contenedor tipo celular igual al Shell del Dashboard */
    .quiz-shell {
      width: 100%;
      max-width: 600px;
      height: 100vh;
      background: #0c0c0f;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      padding: 20px;
    }

    /* EFECTO AKATSUKI (CAPA DE ENTRADA) */
    #akatsuki-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }
    .loading-text {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--color-primary);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--color-primary);
      animation: pulse 1.5s infinite;
    }

    /* CONTENEDOR DE ESTADOS DEL QUIZ */
    .quiz-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    /* ESTADO 1: LA NUBE/VENTANA DE LA PREGUNTA */
    .question-card {
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.175);
    }
    .question-card h2 {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1.5rem;
      line-height: 1.3;
    }

    /* BARRA DE TIEMPO DELIZANTE (Amarillo a Naranja Ladrillo) */
    .timer-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .timer-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #f5d142 0%, #ff5722 100%);
      border-radius: 10px;
      transform-origin: left;
      /* La animación de 6s se controlará dinámicamente con JS */
    }

    /* ESTADO 2: BLOQUES DE RESPUESTAS A, B, C, D */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .option-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 600;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .option-btn .badge {
      font-family: var(--font-mono);
      background: rgba(255,255,255,0.1);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-accent);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .option-btn:active {
      transform: scale(0.98);
    }

    /* ESTADO 3: VENTANA DE RETROALIMENTACIÓN CINEMÁTICA */
    .feedback-card {
      background: rgba(5, 5, 5, 0.95);
      border: 2px solid var(--color-primary);
      box-shadow: 0 0 20px var(--color-primary);
      border-radius: 24px;
      padding: 25px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 15px;
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    /* Cabecera del Estado (Éxito / Incorrecto) */
    .feedback-header {
      font-family: var(--font-display);
      font-size: 2.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .feedback-header.exito { color: #4caf50; text-shadow: 0 0 10px rgba(76,175,80,0.3); }
    .feedback-header.error { color: #f44336; text-shadow: 0 0 10px rgba(244,67,54,0.3); }

    /* Bloque Medio: Info + Sticker Flotante estilo Jujutsu */
    .feedback-body {
      display: flex;
      gap: 15px;
      align-items: center;
      min-height: 140px;
    }
    .feedback-info {
      flex: 1;
    }
    .feedback-info .correct-answer-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--color-accent);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .feedback-info .correct-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .feedback-info .extra-explanation {
      font-size: 0.95rem;
      color: #a3a3ad;
      line-height: 1.4;
    }

    /* Sticker de Personaje Animado Flotante */
    .sticker-container {
      width: 110px;
      height: 140px;
      position: relative;
      flex-shrink: 0;
    }
    .character-sticker {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
      animation: floatEffect 4s ease-in-out infinite;
    }

    /* BOTÓN SIGUIENTE ACCIONABLE (Abajo del todo) */
    .action-btn {
      width: 100%;
      background: var(--color-secondary);
      border: 1px solid var(--color-accent);
      color: #fff;
      font-family: var(--font-display);
      font-size: 1.5rem;
      padding: 14px;
      border-radius: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }

    /* PANTALLA FINAL */
    .score-card {
      text-align: center;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 20px;
      animation: fadeIn 0.5s ease;
    }
    .score-number {
      font-family: var(--font-mono);
      font-size: 3.5rem;
      color: #f5d142;
      margin: 15px 0;
      text-shadow: 0 0 15px rgba(245,209,66,0.4);
    }

    /* ANIMACIONES CSS */
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes floatEffect {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

  <div class="quiz-shell">

    <div id="akatsuki-overlay">
      <div class="loading-text"><i class="fa-solid fa-cloud" style="margin-right: 10px;"></i>Invocando Quiz...</div>
    </div>

    <div class="quiz-box" id="quiz-box">
      
      </div>

  </div>

  <script>
    // Esto asegura que la capa Akatsuki desaparezca a los 1.5 segundos para que veas el fondo
    setTimeout(() => {
      const overlay = document.getElementById('akatsuki-overlay');
      if(overlay) overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 500);
    }, 1500);
  </script>

</body>
</html>
