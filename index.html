<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Me Gusta el Anime · Entrar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/transitions.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Velo del portal: arranca invisible, JS lo activa al confirmar entrada -->
  <div id="portal-veil" class="portal-veil"></div>

  <div class="pantalla-login">
    <div class="split-panel entrada-login" id="split-panel">

      <!-- LADO VISUAL: tómbola de animaciones (doble iframe en cross-fade) -->
      <div class="panel-visual">
        <iframe id="fondoA" class="panel-visual__frame activa" data-actual="megustaelanime.html"
                src="megustaelanime.html" title="" tabindex="-1" aria-hidden="true"></iframe>
        <iframe id="fondoB" class="panel-visual__frame" data-actual=""
                src="" title="" tabindex="-1" aria-hidden="true"></iframe>
        <div class="panel-visual__branding">
          <div class="logo-graffiti">Me Gusta<br>el Anime</div>
          <p>Quizzes, torneos con premios reales y el feed de la comunidad. Todo en un solo lugar.</p>
        </div>
      </div>

      <!-- LADO DE FORMULARIOS -->
      <div class="panel-formularios">
        <div class="formularios-wrapper">

          <!-- LOGIN -->
          <form id="form-login" class="formulario activo" novalidate>
            <h2 class="formulario__titulo">Entrar</h2>
            <p class="formulario__subtitulo">Bienvenido de vuelta, otaku.</p>

            <div class="input-grupo">
              <label for="login-email">Correo</label>
              <input type="email" id="login-email" placeholder="tucorreo@ejemplo.com" required autocomplete="email" />
            </div>

            <div class="input-grupo">
              <label for="login-password">Contraseña</label>
              <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <span class="olvido-password" id="btn-olvido-password">¿Olvidaste tu contraseña?</span>

            <button type="submit" class="btn btn-primario" style="width:100%;" id="btn-login">
              <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>

            <div class="zona-mensajes" id="mensajes-login"></div>

            <p class="formulario__pie">
              ¿Todavía no tienes cuenta?
              <button type="button" id="ir-a-registro">Regístrate</button>
            </p>
          </form>

          <!-- REGISTRO -->
          <form id="form-registro" class="formulario" novalidate>
            <h2 class="formulario__titulo">Crear cuenta</h2>
            <p class="formulario__subtitulo">Únete a la comunidad en menos de un minuto.</p>

            <div class="input-grupo">
              <label for="registro-usuario">Usuario</label>
              <input type="text" id="registro-usuario" placeholder="Tu nombre de otaku" required autocomplete="username" />
            </div>

            <div class="input-grupo">
              <label for="registro-email">Correo</label>
              <input type="email" id="registro-email" placeholder="tucorreo@ejemplo.com" required autocomplete="email" />
            </div>

            <div class="input-grupo">
              <label for="registro-password">Contraseña</label>
              <input type="password" id="registro-password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password" />
            </div>

            <button type="submit" class="btn btn-primario" style="width:100%;" id="btn-registro">
              <i class="fa-solid fa-user-plus"></i> Crear cuenta
            </button>

            <div class="zona-mensajes" id="mensajes-registro"></div>

            <p class="formulario__pie">
              ¿Ya tienes cuenta?
              <button type="button" id="ir-a-login">Inicia sesión</button>
            </p>
          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- Módulo de fondo: SOLO decide qué animación se ve. No sabe nada de auth. -->
  <script src="js/fondo-tombola.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
